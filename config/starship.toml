# Starship Prompt Configuration
# https://starship.rs/config/

# Timeout for starship to execute commands (ms)
command_timeout = 500

# Add newline before prompt for breathing room
add_newline = true

# Format structure
format = """
$username\
$hostname\
$directory\
$git_branch\
$git_commit\
$git_state\
$git_status\
$docker_context\
$nodejs\
$python\
$rust\
$golang\
$package\
$line_break\
$character"""

[character]
success_symbol = "[❯](bold green)"
error_symbol = "[❯](bold red)"

[directory]
truncation_length = 3
truncate_to_repo = true
format = "[$path]($style)[$read_only]($read_only_style) "
style = "bold cyan"

[git_branch]
# Truncate branch names to prevent overflow
truncation_length = 30
truncation_symbol = "…"
format = "on [$symbol$branch(:$remote_branch)]($style) "
symbol = " "
style = "bold purple"

[git_status]
format = "([$all_status$ahead_behind]($style) )"
style = "bold yellow"
conflicted = "🏳"
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"
untracked = "?${count}"
stashed = "📦"
modified = "!${count}"
staged = "+${count}"
renamed = "»${count}"
deleted = "✘${count}"

[git_commit]
commit_hash_length = 7
tag_symbol = " 🏷  "
format = "[$hash$tag]($style) "
style = "bold green"

[git_state]
format = '\([$state( $progress_current/$progress_total)]($style)\) '
style = "bright-black"

[nodejs]
format = "via [$symbol($version )]($style)"
symbol = " "
style = "bold green"

[python]
format = 'via [${symbol}${pyenv_prefix}(${version} )(\($virtualenv\) )]($style)'
symbol = " "
style = "bold yellow"

[rust]
format = "via [$symbol($version )]($style)"
symbol = " "
style = "bold red"

[golang]
format = "via [$symbol($version )]($style)"
symbol = " "
style = "bold cyan"

[docker_context]
format = "via [$symbol$context]($style) "
symbol = " "
style = "bold blue"

[package]
format = "is [$symbol$version]($style) "
symbol = "📦 "
style = "bold 208"
