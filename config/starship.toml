# Get editor completions based on the config schema
"$schema" = 'https://starship.rs/config-schema.json'

format = """
$username\
$hostname\
$directory\
$git_branch\
$git_state\
$git_status\
$cmd_duration\
$battery\
$line_break\
$character"""

scan_timeout = 300
command_timeout = 1400

[directory]
style = "bold blue"

[character]
success_symbol = "[ÔØ»](bold green)"
error_symbol = "[ÔØ»](bold red)"
vicmd_symbol = "[¯ÿ½](bold green)"

[git_branch]
symbol = "¯®ó "
style = "bright-yellow"
format = "[$symbol$branch]($style) "

[git_state]
style = "bright-yellow"
format = '\([$state( $progress_current/$progress_total)]($style)\) '

[git_status]
style = "bright-black"
conflicted = "[´Öù ${count}](red) "
untracked = "[¯½ù ${count}](yellow) "
modified = "[´æÖ ${count}](blue) "
staged = "[´æù ${count}](green) "
renamed = "[´æÜ ${count}](yellow) "
deleted = "[´æÿ ${count}](gray) "
ahead = "[¯¬í${ahead_count}]($style)"
behind = "[¯¬Ü${behind_count}]($style)"
diverged = "[¯¬í${ahead_count} ¯¬Ü${behind_count}]($style) "
stashed = "[´Öì ${count}](bright-black) "
format = '([$all_status$ahead_behind]($style) )'

[cmd_duration]
style = "bright-black"
format = "[$duration]($style) "

[battery]
full_symbol = "´ò© "
charging_symbol = "´ûâ "
discharging_symbol = "´ûé "

[[battery.display]]
threshold = 30
style = "red"
